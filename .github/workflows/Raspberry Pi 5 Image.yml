name: Build & Release Custom Raspberry Pi 5 Image

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  IMG_NAME: custom-rpi5-os
  KERNEL_REPO: pa3gsb/linux
  PI_GEN_REPO: jumbo5566/pi-gen

jobs:
  build-image:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install core dependencies (including QEMU for ARM64)
        run: |
          sudo apt update
          sudo apt install -y \
            git wget curl bc bison flex libssl-dev make libc6-dev \
            libncurses5-dev rsync xz-utils kmod cpio \
            debootstrap zerofree parted dosfstools \
            gcc-aarch64-linux-gnu \
            qemu-user-static binfmt-support libarchive-tools

          # Verify qemu-aarch64-static exists
          if [ ! -f /usr/bin/qemu-aarch64-static ]; then
            echo "ERROR: qemu-aarch64-static not found!" >&2
            exit 1
          fi

          # Create symlink for compatibility
          sudo rm -f /usr/bin/qemu-aarch64
          sudo ln -sf /usr/bin/qemu-aarch64-static /usr/bin/qemu-aarch64
          echo "✅ Created symlink: qemu-aarch64 → qemu-aarch64-static"

          # Enable binfmt
          sudo systemctl restart systemd-binfmt
          sudo update-binfmts --enable qemu-aarch64

          # === CRITICAL FIX: Verify with STATICALLY LINKED binary ===
          echo "=== Verifying QEMU with static aarch64 binary ==="
          
          # Compile a statically linked test program
          echo '#include <stdio.h>
                int main() { printf("QEMU works!\\n"); return 0; }' > test.c
          aarch64-linux-gnu-gcc -static -o test-aarch64 test.c
          
          # Run it — this must succeed for pi-gen to work
          if timeout 10s ./test-aarch64; then
            echo "✅ SUCCESS: QEMU aarch64 emulation is fully functional!"
          else
            echo "❌ FAILURE: QEMU emulation failed (static binary test)" >&2
            ls -l /proc/sys/fs/binfmt_misc/
            systemctl status systemd-binfmt --no-pager
            cat /proc/sys/fs/binfmt_misc/qemu-aarch64 || true
            exit 1
          fi
          
          rm -f test.c test-aarch64

          # Final sanity checks
          echo "=== Final tool check ==="
          command -v qemu-aarch64 && echo "✓ qemu-aarch64 OK"
          command -v bsdtar && echo "✓ bsdtar OK"
          [ -e /proc/sys/fs/binfmt_misc/qemu-aarch64 ] && echo "✓ binfmt registered" || echo "✗ binfmt NOT registered"

      - name: Clone and build custom kernel
        run: |
          git clone --depth=1 https://github.com/${{ env.KERNEL_REPO }}.git linux
          cd linux

          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export KERNEL=kernel8

          make bcm2712_defconfig
          make -j$(nproc)

          mkdir -p ../modules
          INSTALL_MOD_PATH=../modules make modules_install

          mkdir -p ../firmware/boot
          cp arch/arm64/boot/Image ../firmware/boot/$KERNEL.img
          cp arch/arm64/boot/dts/broadcom/*.dtb ../firmware/boot/
          mkdir -p ../firmware/boot/overlays
          cp arch/arm64/boot/dts/overlays/*.dtb* ../firmware/boot/overlays/
          cp arch/arm64/boot/dts/overlays/README ../firmware/boot/overlays/

          echo "KERNEL_VERSION=$(make kernelrelease)" >> $GITHUB_ENV

      - name: Clone pi-gen
        run: |
          git clone --depth=1 https://github.com/${{ env.PI_GEN_REPO }}.git pi-gen

      # ✅ Fix dependencies for Ubuntu (precise, not disabling)
      - name: Fix pi-gen dependencies for Ubuntu
        working-directory: pi-gen
        run: |
          cp depends depends.bak
          sed -i 's/qemu-arm:qemu-user-binfmt/qemu-arm-static:qemu-user-static/g' depends
          sed -i 's/^arch-test/# arch-test (skipped for Ubuntu)/g' depends
          echo "✅ Fixed 'depends' file"
          cat depends

      - name: Configure pi-gen
        working-directory: pi-gen
        run: |
          cat > config <<EOF
          IMG_NAME='${{ env.IMG_NAME }}'
          RELEASE=trixie
          ENABLE_SSH=1
          WPA_COUNTRY=US
          EOF

      - name: Replace kernel in stage1
        run: |
          rm -rf pi-gen/stage1/00-boot-files/files/*
          cp -r firmware/boot/* pi-gen/stage1/00-boot-files/files/

          mkdir -p pi-gen/stage1/01-sys-tweaks/files/lib/modules/
          cp -r modules/lib/modules/* pi-gen/stage1/01-sys-tweaks/files/lib/modules/

      - name: Build image
        working-directory: pi-gen
        run: |
          # No SKIP_DEPENDENCY_CHECK needed — our fixes are in place
          sudo ./build.sh

      - name: Locate and compress image
        id: find_image
        run: |
          IMG_PATH=$(find ./pi-gen/work -name "${{ env.IMG_NAME }}*.img" | head -n1)
          if [ -z "$IMG_PATH" ]; then
            echo "❌ No .img found!"
            ls -R ./pi-gen/work/ || true
            exit 1
          fi
          echo "✅ Image found: $IMG_PATH"
          xz -9 -T0 "$IMG_PATH"
          echo "COMPRESSED_IMG=${IMG_PATH}.xz" >> $GITHUB_OUTPUT
          echo "IMG_FILENAME=$(basename "${IMG_PATH}.xz")" >> $GITHUB_OUTPUT

      - name: Get current time
        id: current-time
        run: |
          echo "time=$(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: ${{ steps.find_image.outputs.COMPRESSED_IMG }}
          body: |
            Built with custom kernel from [${{ env.KERNEL_REPO }}](https://github.com/${{ env.KERNEL_REPO }}).

            - Kernel: ${{ env.KERNEL_VERSION }}
            - Base: Raspberry Pi OS trixie
            - SSH enabled

            Download and decompress:
            ```bash
            xz -d  $ {{ steps.find_image.outputs.IMG_FILENAME }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
