name: Build & Release Custom Raspberry Pi 5 Image

on:
  push:
    tags:
      - 'v*.*.*'  # 仅当推送版本标签时触发发布（如 v1.0.0）
  workflow_dispatch:  # 允许手动触发

env:
  IMG_NAME: custom-rpi5-os
  KERNEL_REPO: pa3gsb/linux
  PI_GEN_REPO: RPi-Distro/pi-gen

jobs:
  build-image:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and enable QEMU binfmt for multiarch
        run: |
          sudo apt update
          sudo apt install -y \
            git wget curl bc bison flex libssl-dev make libc6-dev \
            libncurses5-dev rsync xz-utils kmod cpio \
            debootstrap zerofree parted dosfstools \
            gcc-aarch64-linux-gnu \
            qemu-user-static binfmt-support libarchive-tools

          # Enable ARM64 emulation
          sudo systemctl restart systemd-binfmt
          sudo update-binfmts --enable qemu-aarch64

          # Verify
          echo "Checking binfmt:"
          ls /proc/sys/fs/binfmt_misc/qemu-aarch64 && echo "✅ qemu-aarch64 enabled" || echo "❌ NOT ENABLED"
          command -v bsdtar && echo "✅ bsdtar available" || echo "❌ bsdtar missing"

      # =============== 第一步：编译自定义内核 ===============
      - name: Clone and build custom kernel
        run: |
          git clone --depth=1 https://github.com/${{ env.KERNEL_REPO }}.git linux
          cd linux

          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export KERNEL=kernel8

          make bcm2712_defconfig
          make -j$(nproc)

          # 安装模块
          mkdir -p ../modules
          INSTALL_MOD_PATH=../modules make modules_install

          # 收集固件文件（boot 目录结构）
          mkdir -p ../firmware/boot
          cp arch/arm64/boot/Image ../firmware/boot/$KERNEL.img
          cp arch/arm64/boot/dts/broadcom/*.dtb ../firmware/boot/
          mkdir -p ../firmware/boot/overlays
          cp arch/arm64/boot/dts/overlays/*.dtb* ../firmware/boot/overlays/
          cp arch/arm64/boot/dts/overlays/README ../firmware/boot/overlays/

          # 获取内核版本用于命名和 Release
          echo "KERNEL_VERSION=$(make kernelrelease)" >> $GITHUB_ENV

      # =============== 第二步：准备 pi-gen ===============
      - name: Clone pi-gen
        run: |
          git clone --depth=1 https://github.com/${{ env.PI_GEN_REPO }}.git pi-gen

      - name: Configure pi-gen
        working-directory: pi-gen
        run: |
          cat > config <<EOF
IMG_NAME='${{ env.IMG_NAME }}'
RELEASE=bookworm
ENABLE_SSH=1
WPA_COUNTRY=US
EOF

      # =============== 第三步：替换内核和模块 ===============
      - name: Replace kernel in pi-gen stage1
        run: |
          # 清空默认 boot 文件
          rm -rf pi-gen/stage1/00-boot-files/files/*
          # 复制新内核、dtb、overlays
          cp -r firmware/boot/* pi-gen/stage1/00-boot-files/files/

          # 确保模块目录存在
          mkdir -p pi-gen/stage1/01-sys-tweaks/files/lib/modules/
          # 复制内核模块（注意：路径必须匹配 kernelrelease）
          cp -r modules/lib/modules/* pi-gen/stage1/01-sys-tweaks/files/lib/modules/

      # =============== 第四步：构建镜像 ===============
      - name: Build image with pi-gen
        working-directory: pi-gen
        run: |
          sudo ./build.sh

      # =============== 第五步：压缩输出镜像 ===============
      - name: Locate and compress image
        id: find_image
        run: |
          # 查找生成的 .img 文件
          IMG_PATH=$(find ./pi-gen/work -name "${{ env.IMG_NAME }}*.img" | head -n1)
          if [ -z "$IMG_PATH" ]; then
            echo "❌ Error: No image found!"
            ls -R ./pi-gen/work/
            exit 1
          fi
          echo "✅ Found image: $IMG_PATH"
          # 高压缩率压缩（-9），多线程（-T0）
          xz -9 -T0 "$IMG_PATH"
          COMPRESSED="${IMG_PATH}.xz"
          echo "COMPRESSED_IMG=$COMPRESSED" >> $GITHUB_OUTPUT
          echo "IMG_FILENAME=$(basename "$COMPRESSED")" >> $GITHUB_OUTPUT

      # =============== 第六步：获取当前时间（用于 Release 描述） ===============
      - name: Get current time (ISO format)
        id: current-time
        run: |
          echo "time=$(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

      # =============== 第七步：创建 GitHub Release 并上传镜像 ===============
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: ${{ steps.find_image.outputs.COMPRESSED_IMG }}
          body: |
            Custom Raspberry Pi 5 OS image built with kernel from [${{ env.KERNEL_REPO }}](https://github.com/${{ env.KERNEL_REPO }}).

            - **Kernel version**: `${{ env.KERNEL_VERSION }}`
            - **Built on**: ${{ steps.current-time.outputs.time }}
            - **Base OS**: Raspberry Pi OS Bookworm
            - **SSH**: Enabled by default

            Download the `.xz` file and decompress with:
            ```bash
            xz -d  $ {{ steps.find_image.outputs.IMG_FILENAME }}
            ```

            Then write to SD card using Raspberry Pi Imager or `dd`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
