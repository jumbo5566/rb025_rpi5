name: Release Existing Artifact to GitHub Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  ARTIFACT_ID: 6872716381
  REPO_OWNER: jumbo5566
  REPO_NAME: rb025_rpi5

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必须授权才能创建 release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact from nightly.link
        run: |
          ARTIFACT_URL="https://nightly.link/${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}/actions/artifacts/${{ env.ARTIFACT_ID }}.zip"
          echo "Downloading from: $ARTIFACT_URL"
          curl -L -o artifact.zip "$ARTIFACT_URL"

      - name: Unzip artifact
        run: |
          unzip artifact.zip
          ls -l

      - name: Compress image if not already compressed (optional)
        run: |
          # 假设解压后有一个 .img 文件
          IMG_FILE=$(find . -name "*.img" | head -n1)
          if [ -n "$IMG_FILE" ]; then
            echo "Found image: $IMG_FILE"
            if [ ! -f "${IMG_FILE}.xz" ]; then
              echo "Compressing with xz..."
              xz -9 -T0 "$IMG_FILE"
            fi
            echo "RELEASE_FILE=${IMG_FILE}.xz" >> $GITHUB_ENV
          else
            echo "No .img file found!"
            exit 1
          fi

      - name: Get current time
        id: current-time
        run: |
          echo "time=$(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: ${{ env.RELEASE_FILE }}
          body: |
            This release contains the pre-built Raspberry Pi 5 image from a previous CI run.

            - **Source Action Run**: [View on GitHub](https://github.com/${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}/actions/runs/25536292964)
            - **Built on**: ${{ steps.current-time.outputs.time }}

            To use:
            ```bash
            xz -d  $ (basename  $ {{ env.RELEASE_FILE }})
            # Then flash with Raspberry Pi Imager or dd
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
